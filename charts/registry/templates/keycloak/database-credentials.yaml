apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.keycloak.database.existingSecret }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install, pre-upgrade
    "helm.sh/hook-weight": "5"
type: Opaque
{{- $kcSecret := (lookup "v1" "Secret" .Release.Namespace .Values.keycloak.database.existingSecret) }}
{{- $dtrSecret := (lookup "v1" "Secret" .Release.Namespace .Values.postgresql.auth.existingSecret) }}
# 1. Check if keycloak DB secret already exists (reuse it)
{{ if $kcSecret -}}
data:
  db-username: {{ index $kcSecret.data "db-username" }}
  db-password: {{ index $kcSecret.data "db-password" }}
# 2. Check if DTR postgres-init secret exists (copy password from it)
{{ else if $dtrSecret -}}
data:
  db-username: {{ .Values.postgresql.auth.username | b64enc }}
  db-password: {{ index $dtrSecret.data "password" }}
# 3. Fresh install with no existing secrets - use provided password or generate
{{ else -}}
stringData:
  db-username: {{ .Values.postgresql.auth.username | quote }}
  db-password: {{ .Values.postgresql.auth.password | default (randAlphaNum 32) | quote }}
{{ end }}
{{- end }}
